<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #e8a723;
      --gold-hover: #d4951e;
      --dark: #1a1a1a;
      --darker: #111;
      --white: #ffffff;
      --light-gray: #f5f5f5;
      --text: #333;
      --text-light: #ccc;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.7;
      color: var(--text);
      background: var(--white);
    }

    /* Header */
    header {
      background: var(--white);
      text-align: center;
      padding: 2rem 1rem 0;
      border-bottom: 4px solid var(--gold);
    }
    .logo {
      width: 120px;
      height: auto;
      margin-bottom: 0.5rem;
    }
    header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 1.25rem;
      letter-spacing: 0.5px;
    }
    header h1 a {
      color: var(--dark);
      text-decoration: none;
    }

    /* Nav */
    nav {
      display: flex;
      justify-content: center;
      gap: 0.25rem;
      flex-wrap: wrap;
      padding-bottom: 0;
    }
    nav a {
      font-family: 'Open Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border: 2px solid transparent;
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      transition: all 0.2s;
    }
    nav a:hover {
      color: var(--dark);
      background: var(--light-gray);
    }
    nav a.active {
      background: var(--gold);
      color: var(--dark);
      font-weight: 600;
      border-color: var(--gold);
    }

    /* Breadcrumb */
    .breadcrumb {
      background: var(--dark);
      padding: 0.6rem 2rem;
      font-size: 0.85rem;
    }
    .breadcrumb a,
    .breadcrumb span {
      color: var(--white);
      text-decoration: none;
      padding: 0.25rem 0.75rem;
      border-radius: 3px;
    }
    .breadcrumb a {
      background: var(--darker);
    }
    .breadcrumb .current {
      background: var(--gold);
      color: var(--dark);
      font-weight: 600;
    }

    /* Main content */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }
    main h1, main h2 {
      font-family: 'Oswald', sans-serif;
      color: var(--dark);
      font-weight: 700;
    }
    main h1 {
      font-size: 2.25rem;
      margin-bottom: 1.5rem;
    }
    main h2 {
      font-size: 1.5rem;
      border-left: 4px solid var(--gold);
      padding-left: 0.75rem;
      margin-top: 2.5rem;
      margin-bottom: 1rem;
    }
    main h2:first-child {
      margin-top: 0;
    }
    main h3 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.15rem;
      color: var(--dark);
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }
    main p {
      margin-bottom: 1rem;
    }
    a {
      color: var(--gold-hover);
    }
    a:hover {
      color: var(--gold);
    }
    ul, ol {
      padding-left: 1.5rem;
      margin-bottom: 1rem;
    }
    li {
      margin-bottom: 0.4rem;
    }

    /* Highlight block */
    .highlight {
      background: var(--light-gray);
      border-left: 4px solid var(--gold);
      padding: 1.25rem 1.5rem;
      margin: 1.5rem 0;
      border-radius: 0 4px 4px 0;
      font-size: 1.05rem;
    }

    /* Card grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }
    .card {
      background: var(--dark);
      color: var(--white);
      border-radius: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card-body {
      padding: 1.25rem 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .card h3 {
      font-family: 'Oswald', sans-serif;
      color: var(--white);
      margin: 0 0 0.75rem;
      font-size: 1.1rem;
    }
    .card p {
      color: var(--text-light);
      font-size: 0.9rem;
      line-height: 1.6;
      flex: 1;
    }
    .card .btn {
      display: inline-block;
      background: var(--dark);
      color: var(--white);
      border: 2px solid var(--white);
      padding: 0.5rem 1.25rem;
      text-decoration: none;
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
      transition: all 0.2s;
      margin-top: 0.75rem;
    }
    .card .btn:hover {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--dark);
    }

    /* Blockquote */
    blockquote {
      border-left: 4px solid var(--gold);
      margin: 1rem 0;
      padding: 0.75rem 1.25rem;
      background: var(--light-gray);
    }

    /* Gold button */
    .btn-gold {
      display: inline-block;
      background: var(--gold);
      color: var(--dark);
      padding: 0.6rem 1.5rem;
      text-decoration: none;
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
      border: 2px solid var(--gold);
      border-radius: 4px;
      transition: all 0.2s;
    }
    .btn-gold:hover {
      background: var(--gold-hover);
      border-color: var(--gold-hover);
      color: var(--dark);
    }

    /* Footer */
    footer {
      background: var(--dark);
      color: var(--text-light);
      margin-top: 3rem;
      border-top: 4px solid var(--gold);
    }
    .footer-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    footer h3 {
      font-family: 'Oswald', sans-serif;
      color: var(--gold);
      font-size: 1.25rem;
      margin-bottom: 0.75rem;
      border-bottom: 2px solid var(--gold);
      display: inline-block;
      padding-bottom: 0.25rem;
    }
    footer p {
      margin: 0.25rem 0;
      font-size: 0.9rem;
    }
    footer a {
      color: var(--gold);
      text-decoration: underline;
    }
    footer a:hover {
      color: var(--white);
    }
    .footer-donate {
      grid-column: 1 / -1;
      text-align: center;
      padding-top: 1rem;
    }

    /* Responsive */
    @media (max-width: 600px) {
      header { padding: 1.5rem 1rem 0; }
      header h1 { font-size: 1.4rem; }
      .logo { width: 90px; }
      nav a { font-size: 0.8rem; padding: 0.4rem 0.6rem; }
      .container { padding: 1.5rem 1rem; }
      .footer-inner { grid-template-columns: 1fr; }
      .breadcrumb { padding: 0.5rem 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <a href="{{ '/' | relative_url }}">
      <img src="https://www.bamvt.com/wp-content/uploads/2019/10/cropped-bam_logo-1.png" alt="BAM Logo" class="logo">
    </a>
    <h1><a href="{{ '/' | relative_url }}">Bennington Area Makers (BAM)</a></h1>
    <nav>
      <a href="{{ '/about' | relative_url }}" {% if page.url contains 'about' %}class="active"{% endif %}>About</a>
      <a href="{{ '/activities' | relative_url }}" {% if page.url contains 'activities' %}class="active"{% endif %}>Calendar</a>
      <a href="{{ '/contact' | relative_url }}" {% if page.url contains 'contact' %}class="active"{% endif %}>Contact</a>
      <a href="{{ '/code-of-conduct' | relative_url }}" {% if page.url contains 'code-of-conduct' %}class="active"{% endif %}>Code of Conduct</a>
      <a href="{{ '/get-involved' | relative_url }}" {% if page.url contains 'get-involved' %}class="active"{% endif %}>Support Us</a>
    </nav>
  </header>

  {% unless page.url == '/' %}
  <div class="breadcrumb">
    <a href="{{ '/' | relative_url }}">Bennington Area Makers (BAM)</a>
    <span class="current">{{ page.title }}</span>
  </div>
  {% endunless %}

  <main class="container">
    {{ content }}
  </main>

  <footer>
    <div class="footer-inner">
      <div>
        <h3>Address</h3>
        <p>Bennington Area Makers</p>
        <p>PO Box 4332, Bennington, VT 05201</p>
      </div>
      <div>
        <h3>Contact</h3>
        <p><a href="mailto:info@bamvt.com">info@BAMVT.com</a></p>
      </div>
      <div class="footer-donate">
        <a href="{{ '/get-involved' | relative_url }}" class="btn-gold">Donate</a>
      </div>
    </div>
  </footer>
</body>
</html>
