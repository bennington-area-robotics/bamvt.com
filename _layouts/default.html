<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <style>
    :root {
      --primary: #2e7d32;
      --accent: #ff8f00;
      --bg: #fafafa;
      --text: #333;
      --link: #2e7d32;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    header {
      background: var(--primary);
      color: white;
      padding: 1rem 0;
      margin-bottom: 1rem;
    }
    header .container {
      padding-top: 1rem;
      padding-bottom: 1rem;
    }
    header h1 {
      margin: 0;
      font-size: 1.75rem;
    }
    header p {
      margin: 0.5rem 0 0;
      opacity: 0.9;
    }
    main h2 {
      color: var(--primary);
      border-bottom: 2px solid var(--primary);
      padding-bottom: 0.3rem;
      margin-top: 2rem;
    }
    main h2:first-child {
      margin-top: 0;
    }
    main h3 {
      color: var(--primary);
    }
    a {
      color: var(--link);
    }
    a:hover {
      color: var(--accent);
    }
    ul {
      padding-left: 1.5rem;
    }
    li {
      margin-bottom: 0.5rem;
    }
    .highlight {
      background: #e8f5e9;
      border-left: 4px solid var(--primary);
      padding: 1rem;
      margin: 1rem 0;
      border-radius: 0 4px 4px 0;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      margin: 1.5rem 0;
    }
    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1.25rem;
      text-align: center;
    }
    .card h3 {
      margin-top: 0;
    }
    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #ddd;
      font-size: 0.9rem;
      color: #666;
    }
    nav a {
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      margin-right: 1.25rem;
      padding-bottom: 0.25rem;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    nav a:hover {
      color: white;
      border-bottom-color: rgba(255, 255, 255, 0.5);
    }
    nav a.active {
      color: white;
      border-bottom-color: white;
    }
    blockquote {
      border-left: 4px solid var(--primary);
      margin: 1rem 0;
      padding: 0.5rem 1rem;
      background: #f5f5f5;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="{{ '/' | relative_url }}" style="color: white; text-decoration: none;">{{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
      <nav style="margin-top: 0.75rem;">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
        <a href="{{ '/about' | relative_url }}" {% if page.url contains 'about' %}class="active"{% endif %}>About</a>
        <a href="{{ '/activities' | relative_url }}" {% if page.url contains 'activities' %}class="active"{% endif %}>Activities</a>
        <a href="{{ '/get-involved' | relative_url }}" {% if page.url contains 'get-involved' %}class="active"{% endif %}>Get Involved</a>
        <a href="{{ '/contact' | relative_url }}" {% if page.url contains 'contact' %}class="active"{% endif %}>Contact</a>
      </nav>
    </div>
  </header>
  <main class="container">
    {{ content }}
  </main>
  <footer class="container">
    <p>
      &copy; {{ 'now' | date: "%Y" }} The Bennington Area Makers, Inc.
      &nbsp;&middot;&nbsp;
      PO Box 4332, Bennington, VT 05201
      &nbsp;&middot;&nbsp;
      <a href="mailto:info@bamvt.com">info@bamvt.com</a>
      &nbsp;&middot;&nbsp;
      <a href="{{ '/code-of-conduct' | relative_url }}">Code of Conduct</a>
    </p>
  </footer>
</body>
</html>
